<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Doktor Rapp</title>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {

      width: 100%;
      height: 100vh;

      overflow: hidden;

      /* Hintergrundbild */
      background-image: url("rappo.png");

      /* Bild fullscreen */
      background-size: cover;

      /* Bildposition */
      background-position: center;

      /* kein Wiederholen */
      background-repeat: no-repeat;

      background-color: #f4f4f4;

      position: relative;

      /* Serifenschrift */
      font-family: Garamond, "Times New Roman", serif;
    }

    h1 {

      position: absolute;

      top: 60px;

      /* weiter rechts */
      left: 67%;

      transform: translateX(-50%);

      /* etwas kleiner */
      font-size: 60px;

      font-weight: 400;

      color: #111;

      letter-spacing: 1px;

      z-index: 2;
    }

    /* Mobile Ansicht */
    @media (max-width: 768px) {

      body {
        background-position: center top;
      }

      h1 {

        left: 50%;

        font-size: 42px;

        top: 40px;
      }

    }

  </style>
</head>

<body>

  <h1>Doktor Rapp</h1>

  <!-- Konfetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <script>

    window.onload = () => {

      const duration = 7000;

      const end = Date.now() + duration;

      const colors = [
        '#ff4d4d',
        '#ffd93d',
        '#6bff95',
        '#4d96ff',
        '#b967ff',
        '#ff6ec7'
      ];

      (function frame() {

        confetti({
          particleCount: 8,
          angle: 60,
          spread: 90,
          origin: { x: 0 },
          colors: colors
        });

        confetti({
          particleCount: 8,
          angle: 120,
          spread: 90,
          origin: { x: 1 },
          colors: colors
        });

        if (Date.now() < end) {
          requestAnimationFrame(frame);
        }

      }());

    };

  </script>

</body>
</html>
