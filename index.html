<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Doktor Rapp</title>

  <style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #f4f4f4;
    font-family: Garamond, "Times New Roman", serif;
  }

  .container {
    text-align: center;

    /* etwas höher positionieren */
    transform: translateY(-80px);
  }

  h1 {
    font-size: 60px;
    margin-bottom: 35px;
    color: #222;

    /* eleganter */
    font-weight: 500;
    letter-spacing: 1px;
  }

  img {
    width: 350px;
    max-width: 90%;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }
</style>
</head>

<body>

  <div class="container">
    <h1>Doktor Rapp</h1>

    <img src="rappo.png" alt="Doktor Rapp">
  </div>

</body>
</html>
